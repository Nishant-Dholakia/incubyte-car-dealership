spring:
  datasource:
    url: jdbc:sqlite:${DATABASE_PATH:/data/dealership.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

admin:
  email: ${ADMIN_EMAIL:admin@dealer.com}
  password: ${ADMIN_PASSWORD:admin123}