spring:
  datasource:
    url: jdbc:sqlite:file:testdb?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

  sql:
    init:
      mode: never